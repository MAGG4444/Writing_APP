<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Story Forge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="app-kicker"></p>
          <h1 id="app-title"></h1>
          <p class="app-subtitle" id="app-subtitle"></p>
        </div>
        <div class="header-actions">
          <span class="runtime-pill" id="runtime-badge"></span>
          <button id="export-button" class="ghost-button"></button>
          <button id="import-button" class="ghost-button"></button>
        </div>
      </header>

      <main class="app-main">
        <section class="tab-view active" data-tab="storage">
          <div class="storage-layout">
            <aside class="surface explorer-panel">
              <div class="section-head">
                <div>
                  <p class="eyebrow" id="storage-kicker"></p>
                  <h2 id="storage-title"></h2>
                </div>
                <div class="stack-actions">
                  <button id="new-folder-button" class="primary-button"></button>
                  <button id="new-work-button" class="ghost-button"></button>
                </div>
              </div>
              <div id="folder-list" class="folder-list"></div>
            </aside>

            <section class="surface editor-panel">
              <div id="work-empty" class="empty-state"></div>
              <div id="work-editor" class="hidden">
                <div class="editor-header">
                  <div class="grow">
                    <label class="field-label" for="work-title-input" id="work-title-label"></label>
                    <input id="work-title-input" type="text" />
                  </div>
                  <div class="meta-chip" id="current-folder-chip"></div>
                </div>
                <div class="editor-toolbar" id="editor-toolbar"></div>
                <label class="field-label" for="work-content-input" id="editor-label"></label>
                <textarea id="work-content-input" class="main-editor"></textarea>
              </div>
            </section>

            <aside class="surface tools-panel">
              <div class="section-head">
                <div>
                  <p class="eyebrow" id="tools-kicker"></p>
                  <h2 id="tools-title"></h2>
                </div>
              </div>
              <div id="tool-fields" class="tool-fields hidden">
                <div class="tool-card">
                  <label class="field-label" for="tool-formatting" id="tool-formatting-label"></label>
                  <textarea id="tool-formatting"></textarea>
                </div>
                <div class="tool-card">
                  <label class="field-label" for="tool-outline" id="tool-outline-label"></label>
                  <textarea id="tool-outline"></textarea>
                </div>
                <div class="tool-card">
                  <label class="field-label" for="tool-detailed-outline" id="tool-detailed-outline-label"></label>
                  <textarea id="tool-detailed-outline"></textarea>
                </div>
                <div class="tool-card">
                  <label class="field-label" for="tool-plot" id="tool-plot-label"></label>
                  <textarea id="tool-plot"></textarea>
                </div>
                <div class="tool-card">
                  <label class="field-label" for="tool-tags" id="tool-tags-label"></label>
                  <input id="tool-tags" type="text" />
                </div>
                <div class="tool-card">
                  <label class="field-label" for="tool-mind-map" id="tool-mind-map-label"></label>
                  <textarea id="tool-mind-map"></textarea>
                </div>
                <div class="tool-card">
                  <label class="field-label" for="tool-characters" id="tool-characters-label"></label>
                  <textarea id="tool-characters"></textarea>
                </div>
              </div>
              <div id="tool-empty" class="empty-state compact"></div>
            </aside>
          </div>
        </section>

        <section class="tab-view" data-tab="inspiration">
          <div class="surface inspiration-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow" id="inspiration-kicker"></p>
                <h2 id="inspiration-title"></h2>
              </div>
              <div class="search-wrap">
                <input id="inspiration-search" type="search" />
              </div>
            </div>

            <div class="category-row">
              <div id="category-list" class="category-list"></div>
              <button id="new-category-button" class="ghost-button"></button>
            </div>

            <div id="post-list" class="post-list"></div>

            <div class="composer">
              <select id="post-category-select"></select>
              <textarea id="post-input"></textarea>
              <button id="post-button" class="primary-button"></button>
            </div>
          </div>
        </section>

        <section class="tab-view" data-tab="settings">
          <div class="settings-layout">
            <section class="surface settings-panel">
              <div class="section-head">
                <div>
                  <p class="eyebrow" id="appearance-kicker"></p>
                  <h2 id="appearance-title"></h2>
                </div>
              </div>
              <div id="theme-grid" class="theme-grid"></div>
              <p class="source-note" id="theme-source-note"></p>
            </section>

            <section class="surface settings-panel">
              <div class="section-head">
                <div>
                  <p class="eyebrow" id="language-kicker"></p>
                  <h2 id="language-title"></h2>
                </div>
              </div>
              <div id="language-options" class="language-options"></div>
            </section>
          </div>
        </section>
      </main>

      <nav class="bottom-tabs" id="bottom-tabs"></nav>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
